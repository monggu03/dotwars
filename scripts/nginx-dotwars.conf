# ─────────────────────────────────────────────────────────────────────
# nginx-dotwars.conf — 운영 Nginx 설정.
#
# 설치 위치: /etc/nginx/conf.d/dotwars.conf
#
# 동작:
#  - 80 포트: HTTP 요청을 HTTPS 로 강제 리다이렉트. ACME challenge 만 예외.
#  - 443 포트: TLS 종료 + 8080 으로 프록시 + /ws WebSocket 별도 처리.
#
# 첫 배포 절차 (인증서 없는 상태):
#  1. 아래 "HTTPS server" 블록 전체를 # 주석 처리 (한 번에 빠른 sed):
#       sudo sed -i '/^# >>> HTTPS START/,/^# <<< HTTPS END/ s/^/#__/' \
#         /etc/nginx/conf.d/dotwars.conf
#  2. sudo nginx -t && sudo systemctl reload nginx
#  3. certbot --nginx 발급 (Part 7)
#  4. 위 주석 되돌리기:
#       sudo sed -i 's/^#__//' /etc/nginx/conf.d/dotwars.conf
#  5. sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────

# ── 80 포트: ACME challenge + HTTPS 리다이렉트 ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dotwars.kr www.dotwars.kr;

    # Let's Encrypt 가 도메인 소유 검증할 때 이 경로로 token 파일을 받음.
    # certbot --nginx 사용 시 자동 처리되지만, 명시해두면 webroot 방식도 호환.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청은 HTTPS 로 영구 리다이렉트 (301)
    location / {
        return 301 https://$host$request_uri;
    }
}

# >>> HTTPS START (인증서 발급 전엔 통째로 주석 처리. 위 헤더 주석 참고.)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dotwars.kr www.dotwars.kr;

    # ── TLS 인증서 ─────────────────────────────────────────────
    # certbot --nginx 가 자동으로 채우는 경로. 90일마다 자동 갱신.
    ssl_certificate /etc/letsencrypt/live/dotwars.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dotwars.kr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dotwars.kr/chain.pem;

    # 모던 TLS — Mozilla intermediate 기준 (TLS 1.2/1.3).
    # TLS 1.0/1.1 은 보안 약점으로 차단. 모바일 브라우저 호환 충분.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── 공통 프록시 헤더 ───────────────────────────────────────
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Host $host;

    # ── 보안 헤더 (선택, 운영 표준) ─────────────────────────────
    # HSTS — 브라우저가 1년간 https 만 사용하도록 강제. 운영 안정 후 활성 권장.
    # 처음엔 짧게(예: 300초) 두고 점진적으로 늘림. 잘못 설정 시 1년 락인 위험.
    # add_header Strict-Transport-Security "max-age=300" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 8080 프록시 (Spring Boot REST/정적) ───────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ── WebSocket (STOMP /ws + SockJS) ─────────────────────────
    # 핵심 차이:
    #  - Upgrade / Connection 헤더 전달 — HTTP 1.1 → WebSocket 프로토콜 전환에 필수
    #  - proxy_read_timeout 매우 길게 — long-lived 연결 (게임 진행 8시간 동안 유지)
    #  - proxy_buffering off — 실시간 메시지가 버퍼에 갇히지 않게
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── 로그 분리 ────────────────────────────────────────────
    access_log /var/log/nginx/dotwars-access.log;
    error_log /var/log/nginx/dotwars-error.log warn;
}
# <<< HTTPS END
