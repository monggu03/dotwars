# ─────────────────────────────────────────────────────────────────────
# dotwars — Spring Boot 기본 설정
#
# 이 파일은 git에 올라감 → "비밀이 아닌" 값만 포함.
# 카카오 키 / JWT 시크릿 같은 비밀은 application-secret.yml 에서 덮어씀
# (application-secret.yml은 .gitignore 됨, 형태는 application-secret.yml.example 참고)
# ─────────────────────────────────────────────────────────────────────

spring:
  application:
    name: dotwars

  # 기본 프로파일 — 로컬 개발용. 운영(prod)은 추후 application-prod.yml 추가 예정
  profiles:
    active: dev

  # 비밀이 담긴 외부 파일을 "있으면 로드, 없으면 무시"로 임포트.
  # → 운영 서버에서는 application-secret.yml 없이 환경변수만으로 동작시킬 수 있음
  config:
    import: optional:classpath:application-secret.yml

  # ── MySQL 연결 ──────────────────────────────────────────────────────
  # localhost는 docker-compose의 포트 매핑(3306:3306)을 통해 컨테이너에 도달
  # serverTimezone=Asia/Seoul 로 JPA <-> DB 시간 변환 일관성 유지
  datasource:
    url: jdbc:mysql://localhost:3306/dotwars?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: localpassword     # 로컬 docker-compose 와 일치. 운영은 application-secret 에서 덮어씀
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Flyway DB 마이그레이션 ─────────────────────────────────────────
  # 스키마 변경은 db/migration/V{n}__{name}.sql 파일로만. 부팅 시 Flyway 가 자동 적용.
  # baseline-on-migrate: true — 기존 DB(이미 테이블 있는 운영) 에서도 안전하게 도입 가능.
  #                              flyway_schema_history 만 생성하고 V1 은 skip.
  # 로컬은 빈 DB 부터 시작이라 baseline 영향 X (V1 부터 정상 적용).
  flyway:
    enabled: true
    baseline-on-migrate: true
    # baseline-version: 1 — 기존 운영 DB(이미 테이블 있음) 에서 V1 을 baseline 으로 표시 + skip.
    # 신규(빈) DB 의 경우 baseline 트리거 안 됨 → V1 정상 적용.
    # 0 으로 두면 신규 DB 인 척 V1 부터 실행 → 기존 DB 에서 CREATE TABLE 충돌.
    baseline-version: 1
    locations: classpath:db/migration

  # ── JPA / Hibernate ─────────────────────────────────────────────────
  jpa:
    hibernate:
      # validate: 엔티티 ↔ DB 스키마 일치만 검사. 스키마 변경은 Flyway 마이그레이션이 담당.
      # 학습 단계 첫 도입 후 운영 정석. ddl-auto 가 ALTER TABLE 자동 실행하지 않으므로 안전.
      ddl-auto: validate
    show-sql: true               # 콘솔에 SQL 출력 — 어떤 쿼리가 실제로 나가는지 학습용으로 중요
    # OSIV(Open Session In View) 끔.
    # 기본 true 면 뷰 렌더링 시점까지 DB 커넥션을 들고 있어 트래픽 많을 때 풀 고갈 위험.
    # REST API 만 제공하므로 false 가 정석. 트랜잭션 경계는 @Transactional 에서 명확히 닫힘.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true         # SQL을 보기 좋게 줄바꿈/들여쓰기
        # dialect 는 명시하지 않음 — Hibernate 가 JDBC 드라이버로부터 MySQL 8 을 자동 감지.
        # 명시하면 deprecation 경고가 뜨며, 버전 업 시 수동 갱신 부담만 늘어남.
        # JDBC 배치 인서트 활성화 — 픽셀 이력처럼 대량 insert 발생할 때 성능 차이 큼
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Redis 연결 ──────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s               # 명령 응답 대기 한도 — 너무 길면 사용자 응답이 늦어짐
      lettuce:
        pool:
          # 동시 픽셀 칠하기 + 캔버스 broadcast 시 커넥션 풀 부족 방지
          max-active: 16
          max-idle: 8
          min-idle: 2

# ── 카카오 OAuth 설정 ──────────────────────────────────────────────────
# 실제 client-id/secret은 application-secret.yml 에 정의.
# 환경변수로도 주입 가능 (운영 EC2에서 권장): KAKAO_CLIENT_ID=...
kakao:
  client-id: ${KAKAO_CLIENT_ID:CHANGE_ME}
  client-secret: ${KAKAO_CLIENT_SECRET:CHANGE_ME}
  # 카카오 디벨로퍼스에 등록할 콜백 URL — 운영 도메인과 일치시켜야 함
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}
  # 카카오 인증 서버 엔드포인트 — 카카오 정책 변경 시 여기만 갱신
  authorization-uri: https://kauth.kakao.com/oauth/authorize
  token-uri: https://kauth.kakao.com/oauth/token
  user-info-uri: https://kapi.kakao.com/v2/user/me

# ── JWT 설정 ──────────────────────────────────────────────────────────
# secret 은 base64 인코딩된 256bit 이상 키. application-secret.yml 에서 주입
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_BASE64_256BIT}
  # 액세스 토큰 만료 7일 (604800초).
  # 축제 3일 운영 동안 학생이 한 번 로그인하면 만료 없이 사용 → refresh token 흐름 불필요.
  # 만료 짧게(예: 1시간) 잡으면 refresh 메커니즘이 필수가 되어 코드 복잡도가 증가.
  access-token-validity-seconds: 604800
  issuer: dotwars

# ── 인증 쿠키 설정 ────────────────────────────────────────────────────
auth:
  cookie:
    # localhost HTTP 개발 환경에서는 false. 운영(HTTPS)에서는 반드시 true 로 바꿔야 함.
    # Secure=true 인 쿠키는 HTTPS 연결에서만 전송되므로 평문 도청 방지.
    secure: false

# ── 게임 규칙 상수 (DB가 아닌 설정값) ────────────────────────────────────
# 운영 중 빠른 튜닝이 필요할 수 있는 값들. 컴파일/배포 없이 yml만 바꿔도 반영되도록 분리
game:
  canvas:
    # 9:16 모바일 비율 — 폰 화면을 꽉 채우면서 셀이 22px 정도로 터치하기 편함.
    # 셀 수 576개 (50x50=2500 의 23%). 변경 시 DB games + Redis canvas 도 동기화 필요.
    width: 18
    height: 32
  cooldown-seconds: 300          # 사용자별 픽셀 쿨다운 (5분)

# ── 서버 ──────────────────────────────────────────────────────────────
server:
  port: 8080

# ── 로깅 ──────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.dongguk.dotwars: DEBUG   # 우리 코드만 상세 로그 — 외부 라이브러리는 덜 시끄럽게
    org.hibernate.SQL: DEBUG     # 실제 발사된 SQL 보기
    # 바인딩된 파라미터까지 보고 싶으면 다음 줄 주석 해제
    # org.hibernate.orm.jdbc.bind: TRACE
