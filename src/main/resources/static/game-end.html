<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>GAME OVER — dotwars</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/game-end.css">
</head>
<body>
<main class="app-container">
    <section class="end-screen">

        <!-- ── GAME OVER 헤더 ───────────────────────────────────── -->
        <header class="end-header">
            <h1 class="end-title">GAME OVER</h1>
            <p class="end-subtitle">3일간 수고하셨습니다</p>
        </header>

        <!-- ── 최종 캔버스 이미지 ────────────────────────────────── -->
        <!--
          게임이 끝난 시점의 캔버스 스냅샷. 진영색이 칠해진 50x50 픽셀.
          격자선 포함. canvas.toDataURL() 로 PNG 저장 가능.
        -->
        <figure class="end-canvas-wrap">
            <canvas id="end-canvas" width="500" height="500"
                    aria-label="최종 캔버스 상태"></canvas>
            <figcaption class="end-canvas-caption" id="canvas-caption">
                — 로딩 중 —
            </figcaption>
        </figure>

        <!-- ── 우승 진영 카드 (가장 큰 시각 강조) ─────────────────── -->
        <div class="winner-card" id="winner">
            <div class="winner-card__label">우승 진영</div>
            <div class="winner-card__name" id="winner-name">—</div>
            <div class="winner-card__stat">
                <span id="winner-pct">—</span>
                <span class="winner-card__sep">·</span>
                <span id="winner-pixels">—</span>
            </div>
        </div>

        <!-- ── 본인 진영 결과 (로그인 사용자만) ──────────────────── -->
        <div class="my-card hidden" id="my-card">
            <div class="my-card__label">내 진영</div>
            <div class="my-card__row">
                <span class="my-card__name" id="my-faction-name">—</span>
                <span class="my-card__rank font-pixel" id="my-rank">—</span>
            </div>
        </div>

        <!-- ── 진영별 최종 순위 ─────────────────────────────────── -->
        <section class="end-ranking-section">
            <h2 class="end-ranking-title">진영별 최종 순위</h2>
            <ol class="end-ranking" id="ranking"></ol>
        </section>

        <!-- ── 액션 버튼 ──────────────────────────────────────── -->
        <div class="end-actions">
            <button class="btn btn-secondary btn-block" id="download-canvas">
                캔버스 이미지 저장
            </button>
            <button class="btn btn-secondary btn-block" id="back-home">
                처음으로
            </button>
        </div>

    </section>
</main>

<script type="module" src="/js/game-end.js"></script>
</body>
</html>
