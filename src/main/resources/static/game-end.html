<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>결과 발표 — 동국대학교 봄 대동제 픽셀 점령전</title>

    <!-- Open Graph — 카카오톡/SNS 미리보기 (index.html 참고) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="동국대학교 봄 대동제 픽셀 점령전">
    <meta property="og:description" content="내 단과대 색깔로 3일 동안 캔버스를 점령하세요!">
    <meta property="og:url" content="https://dotwars.kr/game-end.html">
    <meta property="og:image" content="https://dotwars.kr/images/og-image.png">
    <meta property="og:image:width" content="1488">
    <meta property="og:image:height" content="744">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="dotwars">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="동국대학교 봄 대동제 픽셀 점령전">
    <meta name="twitter:description" content="내 단과대 색깔로 3일 동안 캔버스를 점령하세요!">
    <meta name="twitter:image" content="https://dotwars.kr/images/og-image.png">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/game-end.css">
</head>
<body>
<main class="app-container">
    <section class="end-screen">

        <!-- ── GAME OVER 헤더 ───────────────────────────────────── -->
        <header class="end-header">
            <h1 class="end-title">GAME OVER</h1>
            <p class="end-subtitle">3일간 수고하셨습니다<!--
              --> <svg class="end-heart" viewBox="0 0 7 6" shape-rendering="crispEdges" aria-hidden="true">
                    <g fill="currentColor">
                        <rect x="1" y="0" width="2" height="1"/>
                        <rect x="4" y="0" width="2" height="1"/>
                        <rect x="0" y="1" width="7" height="1"/>
                        <rect x="0" y="2" width="7" height="1"/>
                        <rect x="1" y="3" width="5" height="1"/>
                        <rect x="2" y="4" width="3" height="1"/>
                        <rect x="3" y="5" width="1" height="1"/>
                    </g>
                </svg></p>
        </header>

        <!-- ── 최종 캔버스 이미지 ────────────────────────────────── -->
        <!--
          게임이 끝난 시점의 캔버스 스냅샷. 진영색이 칠해진 11×17 그리드.
          격자선 포함. canvas.toDataURL() 로 PNG 저장 가능.
        -->
        <figure class="end-canvas-wrap">
            <canvas id="end-canvas" width="330" height="510"
                    aria-label="최종 캔버스 상태"></canvas>
            <figcaption class="end-canvas-caption" id="canvas-caption">
                — 로딩 중 —
            </figcaption>
        </figure>

        <!-- ── 우승 진영 카드 (가장 큰 시각 강조) ─────────────────── -->
        <div class="winner-card" id="winner">
            <div class="winner-card__label">우승 진영</div>
            <div class="winner-card__name" id="winner-name">—</div>
            <!-- 우승 진영 소속 단과대 목록 — JS 가 /api/departments 로 채움 -->
            <div class="winner-card__departments" id="winner-departments"></div>
            <div class="winner-card__stat">
                <span id="winner-pct">—</span>
                <span class="winner-card__sep">·</span>
                <span id="winner-pixels">—</span>
            </div>
        </div>

        <!-- ── 본인 진영 결과 (로그인 사용자만) ──────────────────── -->
        <div class="my-card hidden" id="my-card">
            <div class="my-card__label">내 진영</div>
            <div class="my-card__row">
                <span class="my-card__name" id="my-faction-name">—</span>
                <span class="my-card__rank font-pixel" id="my-rank">—</span>
            </div>
        </div>

        <!-- ── 진영별 최종 순위 ─────────────────────────────────── -->
        <section class="end-ranking-section">
            <h2 class="end-ranking-title">진영별 최종 순위</h2>
            <ol class="end-ranking" id="ranking"></ol>
        </section>

        <!-- ── 액션 버튼 ──────────────────────────────────────── -->
        <div class="end-actions">
            <button class="btn btn-secondary btn-block" id="download-canvas">
                결과 이미지 저장
            </button>
            <button class="btn btn-secondary btn-block" id="back-home">
                처음으로
            </button>
        </div>

    </section>
</main>

<!-- 결과 이미지 저장 — 화면 전체를 PNG 로 캡쳐. UMD 글로벌 window.html2canvas 노출. -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script type="module" src="/js/game-end.js"></script>
</body>
</html>
