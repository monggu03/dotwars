<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>게임 — dotwars</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/game.css">
</head>
<body>
<main class="app-container">
    <section class="game-screen">

        <div class="game-status">
            <h1 class="game-status__title">곧 게임이 시작됩니다</h1>
            <p class="game-status__message">2026년 5월 17일 16:00 부터 픽셀을 칠할 수 있습니다.</p>

            <div class="game-identity" id="identity">
                <div class="game-identity__row">
                    <div class="game-identity__label">소속 단과대</div>
                    <div class="game-identity__value" id="dept-name">—</div>
                </div>
                <div class="game-identity__row">
                    <div class="game-identity__label">소속 진영</div>
                    <div class="game-identity__value" id="faction-name">—</div>
                </div>
            </div>
        </div>

        <div class="game-actions">
            <button class="btn btn-secondary btn-block" id="logout">
                로그아웃
            </button>
        </div>

    </section>
</main>

<script type="module" src="/js/game.js"></script>
</body>
</html>
