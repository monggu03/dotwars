<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <!-- 모바일 풀스크린 + 아이폰 노치 안전 영역 -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">

    <title>dotwars — 동국대학교 픽셀 점령전</title>

    <!-- ── Open Graph (카카오톡/SNS 링크 미리보기) ──────────────────────
         크롤러가 JS 실행 없이 <head> 만 읽음. og:image 는 절대 URL 필요.
         이미지는 1488x744 nearest-neighbor 업스케일 (픽셀아트 보존).
         미리보기 캐시 갱신: 카카오 디벨로퍼스 > 도구 > 공유 디버거. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="dotwars — 동국대학교 픽셀 점령전">
    <meta property="og:description" content="5분에 1픽셀, 3일 동안 50×50 캔버스를 단과대 진영색으로 점령하세요.">
    <meta property="og:url" content="https://dotwars.kr/">
    <meta property="og:image" content="https://dotwars.kr/images/og-image.png">
    <meta property="og:image:width" content="1488">
    <meta property="og:image:height" content="744">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="dotwars">
    <!-- Twitter Card — 디스코드/슬랙 등 다른 플랫폼도 이 태그를 봄 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="dotwars — 동국대학교 픽셀 점령전">
    <meta name="twitter:description" content="5분에 1픽셀, 3일 동안 50×50 캔버스를 단과대 진영색으로 점령하세요.">
    <meta name="twitter:image" content="https://dotwars.kr/images/og-image.png">

    <!-- Pretendard CDN — 본문 폰트 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <!-- 픽셀 폰트 폴백 — OS 기본 우선, 없을 때만 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/index.css">
</head>
<body>
<main class="app-container">
    <section class="index-screen">

        <header class="index-hero">
            <h1 class="index-logo">DOTWARS</h1>
            <p class="index-subtitle">동국대학교 픽셀 점령전</p>

            <ul class="index-rules" aria-label="게임 규칙">
                <li>5분에 한 번, 1픽셀을 칠합니다</li>
                <li>본인 단과대 색깔로 50×50 캔버스를 점령합니다</li>
                <li>3일 후 가장 많은 픽셀을 가진 진영이 우승</li>
            </ul>
        </header>

        <div class="index-cta">
            <!--
              카카오 로그인은 단순 링크. /api/auth/kakao/login 으로 GET 하면 서버가
              카카오 OAuth 페이지로 302 리다이렉트. JS 처리 불필요.
            -->
            <a class="btn btn-kakao btn-block" href="/api/auth/kakao/login">
                <!-- 카카오 말풍선 로고 — 인라인 SVG. 외부 리소스 의존 X -->
                <svg class="kakao-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3C6.48 3 2 6.58 2 11c0 2.86 1.86 5.36 4.65 6.78l-1.18 4.32c-.1.37.3.65.62.43L11.4 19.5c.2.01.4.01.6.01 5.52 0 10-3.58 10-8.01S17.52 3 12 3z"/>
                </svg>
                <span>카카오로 시작하기</span>
            </a>

            <!-- 자세한 룰 / 진영 소개 페이지로 -->
            <a class="index-rules-link" href="/rules.html">자세한 규칙 + 진영 보기</a>

            <p class="index-footer">© 2026 dotwars.kr</p>
        </div>

    </section>
</main>

<!-- 페이지 분기 (이미 로그인이면 다음 페이지로) -->
<script type="module" src="/js/index.js"></script>
</body>
</html>
