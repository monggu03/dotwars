<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>곧 시작합니다 — 동국대학교 봄 대동제 픽셀 점령전</title>

    <!-- Open Graph — index.html 과 동일한 미리보기 -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="동국대학교 봄 대동제 픽셀 점령전">
    <meta property="og:description" content="내 단과대 색깔로 3일 동안 캔버스를 점령하세요!">
    <meta property="og:url" content="https://dotwars.kr/waiting.html">
    <meta property="og:image" content="https://dotwars.kr/images/og-image.png">
    <meta property="og:image:width" content="1488">
    <meta property="og:image:height" content="744">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="dotwars">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/waiting.css">
</head>
<body>
<main class="app-container">
    <section class="waiting-screen">

        <!-- 진영 정보 (로그인+단과대 선택 완료 사용자만 보임) -->
        <header class="waiting-header" id="waiting-header" hidden>
            <span class="faction-color-dot" id="my-faction-dot" aria-hidden="true"></span>
            <span class="font-pixel" id="my-faction-name">--</span>
        </header>

        <!-- 메인 카운트다운 영역 -->
        <div class="waiting-main">
            <p class="waiting-label" id="waiting-label">— 로딩 중 —</p>
            <p class="waiting-countdown font-pixel" id="waiting-countdown">--:--:--</p>
            <p class="waiting-hint" id="waiting-hint">남음</p>
        </div>

        <!-- 보조 안내 + 친구 초대 -->
        <footer class="waiting-footer">
            <!-- 게임 시작 알림 관련 공지 — 밑줄 텍스트, 클릭 시 모달 -->
            <button class="waiting-notice-link" id="notice-open" type="button">
                게임 시작 알림 안내
            </button>
            <!-- 기다리는 시간 = 친구 부르기 좋은 타이밍. 게임 화면엔 일부러 안 넣음 (산만 방지) -->
            <button class="btn btn-secondary btn-block" id="invite-friends" type="button">
                친구 초대하기
            </button>
            <!-- 인스타그램 공식계정 — 새 탭으로. 다운타임에 팔로우 유도. -->
            <a class="btn btn-secondary btn-block" href="https://instagram.com/dongguk_dotwars"
               target="_blank" rel="noopener noreferrer">
                인스타그램 공식계정
            </a>
            <p class="waiting-meta" id="waiting-meta">시작 시각이 되면 자동으로 게임 화면으로 이동합니다.</p>
        </footer>

    </section>

    <!-- 게임 시작 안내 모달 (기본 숨김) -->
    <div class="notice-modal hidden" id="notice-modal" role="dialog" aria-modal="true" aria-labelledby="notice-title">
        <div class="notice-modal__card">
            <h2 class="notice-modal__title" id="notice-title">게임 시작 안내</h2>
            <div class="notice-modal__body">
                <p>카카오 로그인은 본인 확인용으로만 쓰이며, 어떤 개인정보도 수집·저장하지 않습니다.</p>
                <p>때문에 게임 시작 시 개별 알림(문자 등)을 보내드릴 수 없습니다. 인스타그램, 에브리타임 링크 혹은 교내 포스터 QR을 찍으시면, 시작 시각에 자동으로 게임 화면으로 넘어갑니다.</p>
                <p>개인정보 보호를 위한 조치이니 양해 부탁드립니다. 🙏</p>
            </div>
            <button class="btn btn-primary btn-block" id="notice-close" type="button">확인</button>
        </div>
    </div>
</main>

<script type="module" src="/js/waiting.js"></script>
</body>
</html>
